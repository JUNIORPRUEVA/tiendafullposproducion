<!DOCTYPE html>
<html lang="es">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aplicación empresarial FULLTECH SRL.">
  <meta name="theme-color" content="#ffffff">
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(16, 98, 136, 0.14), transparent 34%),
        radial-gradient(circle at bottom right, rgba(27, 144, 168, 0.10), transparent 38%),
        linear-gradient(135deg, #f7fbfd 0%, #edf6f8 52%, #ffffff 100%);
    }

    body {
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 9999;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    #app-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-shell {
      width: min(100%, 420px);
      border: 1px solid rgba(15, 23, 42, 0.07);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
      box-shadow: 0 22px 64px rgba(15, 23, 42, 0.10);
      padding: 28px 24px;
    }

    .loader-mark {
      width: 68px;
      height: 68px;
      border-radius: 22px;
      background: linear-gradient(135deg, #0f6a90 0%, #1aa7a1 100%);
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      box-shadow: 0 16px 36px rgba(15, 106, 144, 0.26);
    }

    .loader-title {
      margin: 18px 0 6px;
      color: #0f172a;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .loader-copy {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.5;
    }

    .loader-bar {
      margin-top: 18px;
      height: 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.08);
      overflow: hidden;
      position: relative;
    }

    .loader-progress {
      height: 100%;
      width: 12%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0f6a90 0%, #1aa7a1 100%);
      box-shadow: 0 0 18px rgba(15, 106, 144, 0.18);
      transition: width 180ms ease;
    }

    .loader-bar::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 96px;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.45) 50%, transparent 100%);
      animation: loader-glow 1.4s linear infinite;
    }

    .loader-meta {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .loader-footnote {
      color: #64748b;
      font-size: 12px;
      letter-spacing: 0.01em;
    }

    .loader-percent {
      color: #0f6a90;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    @keyframes loader-glow {
      0% {
        transform: translateX(-120%);
      }
      100% {
        transform: translateX(420%);
      }
    }

    @media (max-width: 640px) {
      .loader-shell {
        padding: 24px 20px;
        border-radius: 24px;
      }

      .loader-title {
        font-size: 22px;
      }
    }
  </style>

  <!-- PWA / iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FULLTECH">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FULLTECH</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app-loader" aria-live="polite">
    <div class="loader-shell">
      <div class="loader-mark">FT</div>
      <h1 class="loader-title">FULLTECH</h1>
      <p class="loader-copy">
        Cargando la aplicacion y conectando tu configuracion inicial.
      </p>
      <div class="loader-bar">
        <div id="loader-progress" class="loader-progress"></div>
      </div>
      <div class="loader-meta">
        <div id="loader-status" class="loader-footnote">Preparando recursos iniciales...</div>
        <div id="loader-percent" class="loader-percent">12%</div>
      </div>
    </div>
  </div>
  <script src="env.js"></script>
  <script>
    (function () {
      var progress = 12;
      var progressBar = document.getElementById('loader-progress');
      var progressLabel = document.getElementById('loader-percent');
      var statusLabel = document.getElementById('loader-status');
      var milestones = [
        { at: 18, text: 'Cargando configuracion base...' },
        { at: 34, text: 'Descargando motor de la app...' },
        { at: 52, text: 'Inicializando interfaz...' },
        { at: 72, text: 'Preparando modulos...' },
        { at: 88, text: 'Abriendo FULLTECH...' }
      ];
      var milestoneIndex = 0;

      function renderProgress(value) {
        progress = Math.max(12, Math.min(100, value));
        if (progressBar) {
          progressBar.style.width = progress + '%';
        }
        if (progressLabel) {
          progressLabel.textContent = progress + '%';
        }
        while (milestoneIndex < milestones.length && progress >= milestones[milestoneIndex].at) {
          if (statusLabel) {
            statusLabel.textContent = milestones[milestoneIndex].text;
          }
          milestoneIndex += 1;
        }
      }

      var timer = window.setInterval(function () {
        if (progress >= 90) {
          window.clearInterval(timer);
          return;
        }
        var next = progress + (progress < 50 ? 7 : progress < 80 ? 4 : 2);
        renderProgress(next);
      }, 220);

      window.__finishAppLoader = function () {
        window.clearInterval(timer);
        renderProgress(100);
        if (statusLabel) {
          statusLabel.textContent = 'Listo';
        }
      };
    })();

    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('app-loader');
      if (!loader) return;
      if (typeof window.__finishAppLoader === 'function') {
        window.__finishAppLoader();
      }
      loader.classList.add('is-hidden');
      window.setTimeout(function () {
        loader.remove();
      }, 260);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
