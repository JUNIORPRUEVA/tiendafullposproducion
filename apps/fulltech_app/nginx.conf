server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Avoid aggressive caching for shell files so updates propagate.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location = /flutter_service_worker.js {
    add_header Cache-Control "no-cache";
  }

  location = /manifest.json {
    add_header Cache-Control "no-cache";
  }

  location = /assets/.env {
    add_header Cache-Control "no-cache";
  }

  location = /assets/.env.example {
    add_header Cache-Control "no-cache";
  }

  # Flutter web app (safe SPA fallback).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
