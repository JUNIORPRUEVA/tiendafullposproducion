workflows:
  ios-release-no-codesign:
    name: iOS Release Build (No Codesign)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      vars:
        APP_DIR: apps/fulltech_app
        BUNDLE_ID: com.fulltech.app
        APPLE_TEAM_ID: M4WNZDXN2U
    scripts:
      - name: Flutter pub get
        script: |
          cd "$APP_DIR"
          flutter pub get
      - name: Static analysis
        script: |
          cd "$APP_DIR"
          flutter analyze || true
      - name: Build iOS release without codesign
        script: |
          cd "$APP_DIR"
          flutter build ios --release --no-codesign
    artifacts:
      - apps/fulltech_app/build/ios/iphoneos/Runner.app
      - apps/fulltech_app/build/ios/iphoneos/*.app
      - apps/fulltech_app/build/ios/**/*.xcarchive

  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CodemagicKey2
    environment:
      flutter: stable
      xcode: latest
      vars:
        APP_DIR: apps/fulltech_app
        BUNDLE_ID: com.fulltech.app
        APPLE_TEAM_ID: M4WNZDXN2U
    scripts:
      - name: Flutter pub get
        script: |
          cd "$APP_DIR"
          flutter pub get
      - name: Static analysis
        script: |
          cd "$APP_DIR"
          flutter analyze || true
      - name: Fetch iOS signing files
        script: |
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "APPLE_TEAM_ID must be configured in Codemagic variables for automatic iOS signing."
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
      - name: Configure keychain
        script: |
          keychain initialize
          keychain add-certificates
      - name: Apply Xcode signing settings
        script: |
          cd "$APP_DIR"
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          cd "$APP_DIR"
          flutter build ipa --release
    artifacts:
      - apps/fulltech_app/build/ios/ipa/*.ipa
      - apps/fulltech_app/build/ios/archive/*.xcarchive
      - apps/fulltech_app/flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
