workflows:
  ios-release-no-codesign:
    name: iOS Release Build (No Codesign)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      vars:
        APP_DIR: apps/fulltech_app
        BUNDLE_ID: com.fulltech.app
        APPLE_TEAM_ID: M4WNZDXN2U
    scripts:
      - name: Flutter pub get
        script: |
          cd "$APP_DIR"
          flutter pub get
      - name: Static analysis
        script: |
          cd "$APP_DIR"
          flutter analyze || true
      - name: Build iOS release without codesign
        script: |
          cd "$APP_DIR"
          flutter build ios --release --no-codesign
    artifacts:
      - apps/fulltech_app/build/ios/iphoneos/Runner.app
      - apps/fulltech_app/build/ios/iphoneos/*.app
      - apps/fulltech_app/build/ios/**/*.xcarchive

  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CodemagicKey
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        provisioning_profiles:
          - ios_distribution
        certificates:
          - ios_distribution
      vars:
        APP_DIR: apps/fulltech_app
        BUNDLE_ID: com.fulltech.app
        APPLE_TEAM_ID: M4WNZDXN2U
    scripts:
      - name: Create CI env file
        script: |
          cd "$APP_DIR"
          ENV_FILE=".env"
          API_BASE_URL_VALUE="${API_BASE_URL:-https://fulltech-tienda-fulltechapppwa.gcdndd.easypanel.host}"
          APP_BASE_URL_VALUE="${APP_BASE_URL:-$API_BASE_URL_VALUE}"
          API_TIMEOUT_MS_VALUE="${API_TIMEOUT_MS:-15000}"

          {
            echo "APP_ENV=production"
            echo "API_BASE_URL=$API_BASE_URL_VALUE"
            echo "APP_BASE_URL=$APP_BASE_URL_VALUE"
            echo "API_TIMEOUT_MS=$API_TIMEOUT_MS_VALUE"
            if [ -n "${QUOTATION_APPROVAL_ADMIN_PHONE:-}" ]; then
              echo "QUOTATION_APPROVAL_ADMIN_PHONE=$QUOTATION_APPROVAL_ADMIN_PHONE"
            fi
            if [ -n "${RELEASES_API_BASE_URL:-}" ]; then
              echo "RELEASES_API_BASE_URL=$RELEASES_API_BASE_URL"
            fi
            if [ -n "${RELEASES_API_KEY:-}" ]; then
              echo "RELEASES_API_KEY=$RELEASES_API_KEY"
            fi
          } > "$ENV_FILE"
      - name: Flutter pub get
        script: |
          cd "$APP_DIR"
          flutter pub get
      - name: Static analysis
        script: |
          cd "$APP_DIR"
          flutter analyze || true
      - name: Configure keychain
        script: |
          keychain initialize
          keychain add-certificates
      - name: Apply Xcode signing settings
        script: |
          cd "$APP_DIR"
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          cd "$APP_DIR"
          flutter build ipa --release
    artifacts:
      - apps/fulltech_app/build/ios/ipa/*.ipa
      - apps/fulltech_app/build/ios/archive/*.xcarchive
      - apps/fulltech_app/flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
